name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv sync
      - run: uv run pytest

  # Continuous deployment — runs only on push to main, only after lint and
  # test pass. Builds the image, pushes it to Artifact Registry, and rolls
  # a new Cloud Run revision. Auth is keyless via Workload Identity
  # Federation (see infra/terraform/cicd.tf) — no service-account key in
  # repo secrets.
  #
  # Image tags use $GITHUB_SHA (a built-in env var — a 40-char hash, no
  # shell-metacharacter risk) rather than a ${{ }} interpolation.
  deploy:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write # required to mint the GitHub OIDC token for WIF
    steps:
      - uses: actions/checkout@v6

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/203935104513/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: github-deployer@aoe2-live-standings-api.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          IMAGE=us-central1-docker.pkg.dev/aoe2-live-standings-api/aoe2-live-standings-api/api
          docker build -t "$IMAGE:$GITHUB_SHA" -t "$IMAGE:latest" .
          docker push "$IMAGE:$GITHUB_SHA"
          docker push "$IMAGE:latest"

      # Migrations run as a Cloud Run Job before either service rolls a new
      # revision. `jobs execute --wait` blocks until the task completes and
      # propagates its exit status — if the migration fails, this step
      # fails, the deploy step is skipped, and the existing revisions keep
      # serving traffic against the unchanged schema.
      - name: Run database migrations
        run: |
          IMAGE=us-central1-docker.pkg.dev/aoe2-live-standings-api/aoe2-live-standings-api/api
          gcloud run jobs update aoe2-live-standings-api-migrate \
            --image="$IMAGE:$GITHUB_SHA" \
            --region=us-central1 \
            --project=aoe2-live-standings-api
          gcloud run jobs execute aoe2-live-standings-api-migrate \
            --region=us-central1 \
            --project=aoe2-live-standings-api \
            --wait

      - name: Deploy to Cloud Run (api + worker)
        run: |
          IMAGE=us-central1-docker.pkg.dev/aoe2-live-standings-api/aoe2-live-standings-api/api
          gcloud run deploy aoe2-live-standings-api \
            --image="$IMAGE:$GITHUB_SHA" \
            --region=us-central1 \
            --project=aoe2-live-standings-api
          gcloud run deploy aoe2-live-standings-api-worker \
            --image="$IMAGE:$GITHUB_SHA" \
            --region=us-central1 \
            --project=aoe2-live-standings-api

      # Prune stale Cloud Run revisions on both services. Every deploy
      # creates a new revision; Cloud Run does NOT auto-prune them, and
      # every revision keeps its `minScale=1 + cpu_idle=false` shape
      # baked into its spec — so each stale revision pins a hot instance
      # and its DB connection pool. Without this step, revisions
      # accumulate until ~100 stale revisions × ~5 connections each
      # saturates the Cloud SQL `max_connections=100` cap and every
      # endpoint 500s with `TooManyConnectionsError`. That's the 2026-06-01
      # outage in one sentence; see `[[project_cloud_run_revision_outage]]`.
      #
      # Keeps the 2 newest revisions per service (current + one rollback
      # safety margin) and deletes the rest in parallel. Failures here
      # MUST NOT fail the deploy — a transient delete error is a
      # cleanup miss, not a deploy failure. `set +e` keeps the script
      # going on individual errors; the `|| true` on the loop guards
      # against the whole step exiting non-zero.
      - name: Prune stale Cloud Run revisions
        if: success()
        run: |
          set +e
          for SVC in aoe2-live-standings-api aoe2-live-standings-api-worker; do
            echo "::group::Pruning stale revisions on $SVC"
            STALE=$(gcloud run revisions list \
              --service="$SVC" \
              --region=us-central1 \
              --project=aoe2-live-standings-api \
              --sort-by=~metadata.creationTimestamp \
              --format='value(name)' \
              | tail -n +3)
            if [ -z "$STALE" ]; then
              echo "no stale revisions on $SVC"
            else
              echo "$STALE" | xargs -r -P 10 -I {} gcloud run revisions delete {} \
                --region=us-central1 \
                --project=aoe2-live-standings-api \
                --quiet
            fi
            echo "::endgroup::"
          done
          # Never let cleanup miss take down the workflow status.
          true
